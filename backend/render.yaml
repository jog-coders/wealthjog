services:
  - type: web
    name: pf-planner-api
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: PORT
        value: "4000"
